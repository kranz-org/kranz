name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate semantic version tag
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]

      - name: Verify source
        run: make verify

      - name: Generate Homebrew formula
        run: |
          ./scripts/generate-homebrew-formula.sh "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" .release/kranz.rb

      - name: Publish GitHub release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update optional Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check tap configuration
        id: tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
        run: |
          if [[ -z "${TAP_TOKEN}" || -z "${TAP_REPOSITORY}" ]]; then
            echo "Homebrew tap is not configured; kranz.rb remains attached to the release."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Download published formula
        if: steps.tap.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern "kranz.rb"

      - name: Publish formula to tap
        if: steps.tap.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
        run: |
          gh auth setup-git
          gh repo clone "${TAP_REPOSITORY}" tap
          mkdir -p tap/Formula
          cp kranz.rb tap/Formula/kranz.rb
          git -C tap config user.name "kranz-release-bot"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/kranz.rb
          if git -C tap diff --cached --quiet; then
            exit 0
          fi
          git -C tap commit -m "kranz ${GITHUB_REF_NAME}"
          git -C tap push

  attest:
    name: Attest release archives
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download published archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern "*.tar.gz" --dir dist

      - name: Attest release archives
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: "dist/*.tar.gz"
